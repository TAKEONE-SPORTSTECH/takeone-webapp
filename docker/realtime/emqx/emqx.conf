node { name = "emqx@127.0.0.1"  cookie = "takeone-realtime"  data_dir = "/opt/emqx/data" }

listeners.tcp.default  { bind = "0.0.0.0:1883" }
listeners.ws.default   { bind = "0.0.0.0:8083"  websocket.mqtt_path = "/mqtt" }
