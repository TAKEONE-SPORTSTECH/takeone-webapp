    mechanism = jwt
    from = password
    use_jwks = false
    algorithm = "hmac-based"
    secret = "2b5ee4f5ac8362f7fa4450f99183a7103d5e3394843b93608a5748308ddeffc1"
    acl_claim_name = "acl"
  }
]

authorization {
  no_match = deny
  deny_action = ignore
  sources = []
}
