## TAKEONE Realtime — EMQX 5 configuration (HOCON)
##
## JWT authentication: the browser presents the app-minted JWT as its MQTT
## password. EMQX verifies the HS256 signature with the shared secret and reads
## the embedded "acl" claim to authorise subscriptions — so each user is pinned
## to takeone/user/{their-id}/# and cannot publish. The PHP publisher connects
## with the backend username/password configured below.

node {
  name = "emqx@127.0.0.1"
  cookie = "takeone-realtime-cookie"
  data_dir = "/opt/emqx/data"
}

## Listeners — TCP for the server publisher, WS/WSS for browsers.
listeners.tcp.default {
  bind = "0.0.0.0:1883"
}
listeners.ws.default {
  bind = "0.0.0.0:8083"
  websocket.mqtt_path = "/mqtt"
}
listeners.wss.default {
  bind = "0.0.0.0:8084"
  websocket.mqtt_path = "/mqtt"
  ## Drop your TLS cert/key here for direct WSS (or terminate TLS at a proxy).
  ## ssl_options { certfile = "..."  keyfile = "..." }
}

dashboard {
  listeners.http.bind = "0.0.0.0:18083"
}

## ── Authentication ───────────────────────────────────────────────────────────
## 1) JWT for browser clients (verifies app tokens, honours the acl claim).
## 2) A built-in backend account for the Laravel publisher.
authentication = [
  {
    mechanism = jwt
    from = password
    acl_claim_name = "acl"
    use_jwks = false
    algorithm = "hmac-based"
    secret = "${EMQX_JWT_SECRET}"
    verify_claims = {}
  },
  {
    mechanism = password_based
    backend = built_in_database
    user_id_type = username
  }
]

## ── Authorization ────────────────────────────────────────────────────────────
## Honour ACL rules carried in the JWT; default-deny anything not allowed.
## The backend publisher (a superuser created via the dashboard/CLI) bypasses.
authorization {
  no_match = deny
  deny_action = ignore
  sources = [
    { type = built_in_database }
  ]
}

## ── Quick local-dev escape hatch ─────────────────────────────────────────────
## To bring the broker up with NO auth while wiring things locally, comment out
## the whole `authentication`/`authorization` blocks above and uncomment:
# authorization { no_match = allow }
