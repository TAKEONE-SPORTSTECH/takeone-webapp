# ─────────────────────────────────────────────────────────────────────────────
# TAKEONE Realtime — self-hosted MQTT broker (EMQX 5)
#
#   docker compose up -d
#
# Exposes:
#   1883   MQTT/TCP            (PHP publisher — REALTIME_MQTT_PORT)
#   8083   MQTT over WebSocket (browser dev — REALTIME_MQTT_WS_URL=ws://host:8083/mqtt)
#   8084   MQTT over WSS       (browser prod — terminate TLS here or at your proxy)
#   18083  Dashboard           (http://localhost:18083  default admin / public)
#
# Auth: see emqx/emqx.conf — JWT authentication + per-user ACL from the token's
# "acl" claim. Set EMQX_JWT_SECRET to the SAME value as REALTIME_JWT_SECRET in
# the Laravel .env so the broker can verify the tokens the app mints.
# ─────────────────────────────────────────────────────────────────────────────
services:
  emqx:
    image: emqx/emqx:5.8
    container_name: takeone-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE__NAME: "emqx@127.0.0.1"
      EMQX_NODE__COOKIE: "takeone-realtime-cookie"
      # Injected into emqx.conf via ${EMQX_JWT_SECRET}. MUST match REALTIME_JWT_SECRET.
      EMQX_JWT_SECRET: "${EMQX_JWT_SECRET:-change-me-to-match-app-key}"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  emqx-data:
  emqx-log:
