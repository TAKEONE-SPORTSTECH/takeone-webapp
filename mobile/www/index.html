<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>TAKEONE</title>
    <style>
        :root { color-scheme: dark; }
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.25rem; text-align: center;
            font-family: -apple-system, "Segoe UI", Roboto, Inter, sans-serif;
            background: #7F6CE0; color: #fff;
            padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
        }
        .logo {
            width: 92px; height: 92px; border-radius: 22px; background: #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 40px rgba(0,0,0,.25);
        }
        .logo img { width: 64px; height: 64px; }
        h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: .04em; margin: 0; }
        p { font-size: .9rem; opacity: .85; margin: 0; max-width: 22rem; line-height: 1.5; }
        .spinner {
            width: 26px; height: 26px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,.35); border-top-color: #fff;
            animation: spin .8s linear infinite; margin-top: .25rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo"><img src="icon.png" alt="TAKEONE"></div>
    <h1>TAKEONE</h1>
    <div class="spinner"></div>
    <p>Connecting&hellip; If this screen stays, check your internet connection and reopen the app.</p>
</body>
</html>
